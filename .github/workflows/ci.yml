name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Spring Boot image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot:latest ./springboot

      - name: Build Angular image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      - name: Push Spring Boot image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot:latest

      - name: Push Angular image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Run docker compose
        run: docker compose up -d

      - name: Check containers
        run: docker ps
